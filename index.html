    <!-- Telegram -->

    <link rel="icon" type="image/png" sizes="32x32" href="/media/develop_favicon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/media/develop_logo_512x512.png" />

    <!-- Inter via rsms (loaded eagerly by globals.css) -->
    <link rel="preconnect" href="https://rsms.me" crossorigin />

    <!-- Prevent FOUC: apply persisted theme and locale before paint -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('monoroh:theme');
          var theme = stored === 'light' || stored === 'dark' ? stored
            : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
        try {
          var storedLang = localStorage.getItem('monoroh:locale');
          var locale = storedLang === 'en' || storedLang === 'ru' ? storedLang
            : ((navigator.language || 'en').toLowerCase().indexOf('ru') === 0 ? 'ru' : 'en');
          document.documentElement.setAttribute('lang', locale);
        } catch (e) {
          document.documentElement.setAttribute('lang', 'en');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
