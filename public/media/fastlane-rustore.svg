<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="upload_to_ru_store">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#0b3d91"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- subtle inner highlight -->
  <rect x="6" y="6" width="500" height="500" rx="116" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <!-- soft top sheen -->
  <path d="M0 0 H512 V200 Q256 110 0 200 Z" fill="#ffffff" opacity="0.04"/>

  <!-- upload arrow -->
  <g filter="url(#glow)">
    <path
      d="M256 116
         L368 252
         L304 252
         L304 332
         L208 332
         L208 252
         L144 252 Z"
      fill="url(#arrow)"
    />
  </g>

  <!-- destination tray (RuStore-ish) -->
  <rect x="140" y="364" width="232" height="36" rx="14" fill="#ffffff" opacity="0.15"/>
  <rect x="140" y="364" width="232" height="36" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2"/>
  <circle cx="170" cy="382" r="6" fill="#ffffff" opacity="0.9"/>
</svg>
